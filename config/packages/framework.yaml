# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    
    # Session configuration – necessary for cookies to work correctly
    session:
        enabled: true
        handler_id: null
        cookie_secure: auto          # automatically uses HTTPS in production, HTTP in dev
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file